name: Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd PlaywrightJS && npm install

      - name: Install Playwright browsers
        run: cd PlaywrightJS && npx playwright install --with-deps

      - name: Run tests
        run: cd PlaywrightJS && npx playwright test

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PlaywrightJS/playwright-report/
